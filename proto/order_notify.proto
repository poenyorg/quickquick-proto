syntax = "proto3";
import "exchange.proto";
import "google/protobuf/empty.proto";

package order_notify;


service OrderNotifyService {
    rpc SubscribeOrderStatus(RequestOrderStatus) returns (stream OrderStatusReply);
}

// Request by conditions: include exchange_ids AND market_ids
message RequestOrderStatus {
    repeated uint32 exchange_ids = 1;
    repeated uint32 market_ids = 2;  /// List of market identifiers to subscribe to (e.g., BTC/USDC, ETH/USDC)
}

message OrderStatusReply {
    string cloid = 1;   
    exchange.OrderStatus status = 2;
    int64 remaining_size = 3;
    uint32 market_id = 4;
    uint32 exchange_id = 5;
    optional uint32 code = 6;
}
